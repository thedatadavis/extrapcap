name: Refresh market data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1-5'
concurrency:
  group: extrapcap-ops-writer
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ops
          fetch-depth: 0
      - name: Sync source branch
        run: .github/scripts/sync-ops.sh
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e .
      - name: Refresh daily bars
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python -m extrapcap.data.refresh_cli --symbols SPY,AAPL,MSFT,NVDA,AMZN,GOOGL --days 730
      - name: Commit normalized bars
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add data/normalized/bars.csv data/normalized/bars.csv.metadata.json
          git diff --cached --quiet || git commit -m "data: refresh normalized bars"
          .github/scripts/push-ops.sh
