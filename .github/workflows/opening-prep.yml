name: Prepare opening paper candidates
on:
  schedule:
    # 13:00 UTC = 9:00 AM EDT during daylight time.
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
concurrency:
  group: extrapcap-ops-writer
  cancel-in-progress: false
jobs:
  prep:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ops
          fetch-depth: 0
      - name: Sync source branch
        run: .github/scripts/sync-ops.sh
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Refresh complete free earnings-blackout window
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED: ${{ vars.EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED || 'false' }}
        run: python -m extrapcap.earnings --date "$(date -u +%F)"
      - name: Prepare candidates without submitting orders
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_EARNINGS_CALENDAR: data/events/earnings.csv
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
          EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED: ${{ vars.EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED || 'false' }}
        run: >-
          python -m extrapcap.orchestration.basket_cycle_cli
          --basket data/universe/tradable-basket.csv
          --model "$SNIPER_MODEL_PATH"
          --expiration-gte "$(date -u -d '+2 days' +%F)"
          --expiration-lte "$(date -u -d '+35 days' +%F)"
          --max-candidates 10
          --review-phase opening_prep
          --execution-mode dry-run
      - name: Commit opening-prep ledger
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add -A logs data/events/earnings.csv data/events/earnings.csv.metadata.json
          git diff --cached --quiet || git commit -m "ledger: opening paper candidate prep $(date -u +%F)"
          .github/scripts/push-ops.sh
