name: Intraday paper loop
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 14-20 * * 1-5'
concurrency:
  group: extrapcap-main-writer
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Refresh complete free earnings-blackout window
        run: python -m extrapcap.earnings --date "$(date -u +%F)"
      - name: Run one provider-backed 1-minute dry-run scan
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_EARNINGS_CALENDAR: data/events/earnings.csv
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
        run: python -m extrapcap.orchestration.intraday_cli --symbol SPY --model "$SNIPER_MODEL_PATH" --execution-mode dry-run
      - name: Commit intraday ledger
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add -A logs data/events/earnings.csv data/events/earnings.csv.metadata.json
          git diff --cached --quiet || git commit -m "ledger: intraday paper scan $(date -u +%F)"
          git push
