name: Review paper candidates
on:
  workflow_dispatch:
  schedule:
    - cron: '0 15-20 * * 1-5'
jobs:
  review:
    runs-on: ubuntu-latest
    environment: paper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Run provider-backed dry-run review
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
        run: >-
          python -m extrapcap.orchestration.live_cycle
          --symbol SPY
          --model "$SNIPER_MODEL_PATH"
          --expiration-gte "$(date -u -d '+2 days' +%F)"
          --expiration-lte "$(date -u -d '+35 days' +%F)"
          --execution-mode dry-run
