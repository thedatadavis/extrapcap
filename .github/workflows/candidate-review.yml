name: Review paper candidates
on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: Dry-run or guarded paper submission
        required: true
        default: dry-run
        type: choice
        options: [dry-run, paper-submit]
  schedule:
    - cron: '0 15-20 * * 1-5'
concurrency:
  group: extrapcap-main-writer
  cancel-in-progress: false
jobs:
  review:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Refresh complete free earnings-blackout window
        run: python -m extrapcap.earnings --date "$(date -u +%F)"
      - name: Run provider-backed basket review
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_EARNINGS_CALENDAR: data/events/earnings.csv
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
          EXTRAPCAP_PAPER_SUBMIT_ENABLED: ${{ vars.EXTRAPCAP_PAPER_SUBMIT_ENABLED || 'false' }}
          EXTRAPCAP_EXECUTION_MODE: ${{ inputs.execution_mode || vars.EXTRAPCAP_EXECUTION_MODE || 'dry-run' }}
        run: >-
          python -m extrapcap.orchestration.basket_cycle_cli
          --basket data/universe/tradable-basket.csv
          --model "$SNIPER_MODEL_PATH"
          --expiration-gte "$(date -u -d '+2 days' +%F)"
          --expiration-lte "$(date -u -d '+35 days' +%F)"
          --execution-mode "$EXTRAPCAP_EXECUTION_MODE"
      - name: Commit review ledger
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add -A logs data/events/earnings.csv data/events/earnings.csv.metadata.json
          git diff --cached --quiet || git commit -m "ledger: review paper basket $(date -u +%F)"
          git push
