name: Review paper candidates
on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: Dry-run or guarded paper submission
        required: true
        default: dry-run
        type: choice
        options: [dry-run, paper-submit]
  schedule:
    # 15:00 and 19:00 UTC = 11:00 AM and 3:00 PM EDT during daylight time.
    # These are inside the currently permitted new-entry liquidity windows.
    - cron: '0 15,19 * * 1-5'
concurrency:
  group: extrapcap-ops-writer
  cancel-in-progress: false
jobs:
  review:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ops
          fetch-depth: 0
      - name: Sync source branch
        run: .github/scripts/sync-ops.sh
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Refresh complete free earnings-blackout window
        run: python -m extrapcap.earnings --date "$(date -u +%F)"
      - name: Verify paper-submit readiness
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          EXTRAPCAP_PAPER_SUBMIT_ENABLED: ${{ vars.EXTRAPCAP_PAPER_SUBMIT_ENABLED || 'false' }}
        run: python -m extrapcap.diagnostics --require-ready --require-paper-submit-ready
      - name: Assert scheduled paper-submit mode
        if: ${{ github.event_name == 'schedule' }}
        env:
          EXTRAPCAP_EXECUTION_MODE: ${{ github.event_name == 'schedule' && 'paper-submit' || inputs.execution_mode || 'dry-run' }}
        run: test "$EXTRAPCAP_EXECUTION_MODE" = paper-submit
      - name: Run provider-backed basket review
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_EARNINGS_CALENDAR: data/events/earnings.csv
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
          EXTRAPCAP_PAPER_SUBMIT_ENABLED: ${{ vars.EXTRAPCAP_PAPER_SUBMIT_ENABLED || 'false' }}
          EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED: ${{ vars.EXTRAPCAP_CRASH_PROTOCOL_PAPER_ENABLED || 'false' }}
          EXTRAPCAP_EXECUTION_MODE: ${{ github.event_name == 'schedule' && 'paper-submit' || inputs.execution_mode || 'dry-run' }}
        run: >-
          python -m extrapcap.orchestration.basket_cycle_cli
          --basket data/universe/tradable-basket.csv
          --model "$SNIPER_MODEL_PATH"
          --expiration-gte "$(date -u -d '+2 days' +%F)"
          --expiration-lte "$(date -u -d '+35 days' +%F)"
          --max-candidates 10
          --execution-mode "$EXTRAPCAP_EXECUTION_MODE"
      - name: Commit review ledger
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add -A logs data/events/earnings.csv data/events/earnings.csv.metadata.json
          git diff --cached --quiet || git commit -m "ledger: review paper basket $(date -u +%F)"
          .github/scripts/push-ops.sh
