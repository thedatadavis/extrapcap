name: Generate features
on:
  workflow_dispatch:
# Feature generation is a research artifact and is not consumed by live paper workflows.
concurrency:
  group: extrapcap-ops-writer
  cancel-in-progress: false
jobs:
  features:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ops
          fetch-depth: 0
      - name: Sync source branch
        run: .github/scripts/sync-ops.sh
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e .
      - name: Generate signal features
        run: python -m extrapcap.data.features_cli --input data/normalized/bars.csv --output data/features/features.csv
      - name: Commit feature artifact
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add data/features/features.csv
          git diff --cached --quiet || git commit -m "data: generate signal features"
          .github/scripts/push-ops.sh
