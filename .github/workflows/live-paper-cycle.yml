name: Provider-backed paper cycle
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: Underlying symbol
        required: true
        default: SPY
      expiration_gte:
        description: Minimum option expiration YYYY-MM-DD
        required: true
      expiration_lte:
        description: Maximum option expiration YYYY-MM-DD
        required: false
      execution_mode:
        description: Dry-run or guarded paper submission
        required: true
        default: dry-run
        type: choice
        options: [dry-run, paper-submit]
concurrency:
  group: extrapcap-main-writer
  cancel-in-progress: false
jobs:
  cycle:
    runs-on: ubuntu-latest
    environment: paper
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e '.[research]'
      - name: Refresh complete free earnings-blackout window
        run: python -m extrapcap.earnings --date "$(date -u +%F)"
      - name: Provider-backed cycle
        env:
          ALPACA_PAPER: 'true'
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          SNIPER_MODEL_PATH: models/sniper.cbm
          EXTRAPCAP_EARNINGS_CALENDAR: data/events/earnings.csv
          EXTRAPCAP_NEWS_EVENTS: data/events/news.csv
          EXTRAPCAP_NEWS_LLM: 'true'
          EXTRAPCAP_PAPER_SUBMIT_ENABLED: ${{ vars.EXTRAPCAP_PAPER_SUBMIT_ENABLED || 'false' }}
        run: python -m extrapcap.orchestration.live_cycle --symbol "${{ inputs.symbol }}" --model "$SNIPER_MODEL_PATH" --expiration-gte "${{ inputs.expiration_gte }}" --expiration-lte "${{ inputs.expiration_lte }}" --execution-mode "${{ inputs.execution_mode }}"
      - name: Commit paper-cycle ledger
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add -A logs data/events/earnings.csv data/events/earnings.csv.metadata.json
          git diff --cached --quiet || git commit -m "ledger: paper cycle $(date -u +%F)"
          git push
