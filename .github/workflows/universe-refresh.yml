name: Refresh Greenlist
on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * 1'
concurrency:
  group: extrapcap-ops-writer
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ops
          fetch-depth: 0
      - name: Sync source branch
        run: .github/scripts/sync-ops.sh
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: pip install -e .
      - run: python -m extrapcap.universe.cli --output-dir data/universe
      - name: Commit pinned snapshot
        run: |
          git config user.name extrapcap-bot
          git config user.email extrapcap-bot@users.noreply.github.com
          git add data/universe
          git diff --cached --quiet || git commit -m "data: refresh Greenlist snapshot"
          .github/scripts/push-ops.sh
